<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Whetū Digital — Digital tools built for modern businesses in Aotearoa. Launching soon.">
<meta property="og:title" content="Whetū Digital — Coming Soon">
<meta property="og:description" content="Something bold is being built. Digital tools for Aotearoa businesses. Launching soon.">
<meta property="og:type" content="website">
<title>Whetū Digital — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;cursor:none;}
:root{
  --cyan:#10d8ff;--purple:#c040ff;--green:#00ff99;
  --bg:#05050e;--panel:#0a0a1c;--border:#14143a;
  --muted:#404080;--text:#d0d0f0;
}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Space Grotesk','Segoe UI',sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
}

/* ── GRID BG ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:44px 44px;
}

/* ── AMBIENT GLOWS ── */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 55% 45% at 20% 20%,rgba(16,216,255,.055) 0,transparent 65%),
    radial-gradient(ellipse 55% 45% at 80% 80%,rgba(192,64,255,.055) 0,transparent 65%),
    radial-gradient(ellipse 40% 35% at 75% 20%,rgba(0,255,153,.025) 0,transparent 60%);
}

/* ── CANVAS (particles) ── */
#bg-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.2;}

/* ── CURSOR ── */
.cursor-ring{
  position:fixed;width:28px;height:28px;border-radius:50%;
  border:1.5px solid rgba(16,216,255,.8);pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  box-shadow:0 0 8px rgba(16,216,255,.35);mix-blend-mode:screen;
  transition:width .18s,height .18s,border-color .18s;
}
.cursor-dot{
  position:fixed;width:5px;height:5px;border-radius:50%;
  background:#10d8ff;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  box-shadow:0 0 8px #10d8ff,0 0 18px rgba(16,216,255,.5);
}

/* ── MAIN WRAPPER ── */
.main{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  gap:0;text-align:center;
  padding:64px 20px 80px;/* top clears HUD bar; bottom clears HUD bottom */
  width:100%;
}

/* ── LOGO STAGE ── */
.logo-stage{
  position:relative;width:240px;height:240px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:8px;
}
.ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(16,216,255,.12);
  animation:ringPulse 4s ease-in-out infinite;
}
.ring:nth-child(1){width:220px;height:220px;animation-delay:0s;}
.ring:nth-child(2){width:232px;height:232px;animation-delay:1.4s;border-color:rgba(192,64,255,.09);}
.ring:nth-child(3){width:240px;height:240px;animation-delay:2.8s;border-color:rgba(16,216,255,.06);}
.orbiters{position:absolute;width:100%;height:100%;top:0;left:0;display:flex;align-items:center;justify-content:center;}
.orb{position:absolute;width:5px;height:5px;border-radius:50%;top:50%;left:50%;margin:-2.5px;}
.orb:nth-child(1){background:#10d8ff;box-shadow:0 0 6px #10d8ff;animation:orb1 9s linear infinite;}
.orb:nth-child(2){background:#c040ff;box-shadow:0 0 6px #c040ff;animation:orb2 13s linear infinite;}
.orb:nth-child(3){background:#00ff99;box-shadow:0 0 5px #00ff99;animation:orb3 7s linear infinite;}

.logo-wrap{
  position:relative;z-index:2;
  animation:logoSwing 8s ease-in-out infinite, glowPulse 3.5s ease-in-out infinite;
  transform-style:preserve-3d;
}
.logo-wrap::after{
  content:'';position:absolute;left:0;right:0;height:2px;top:0;
  background:linear-gradient(90deg,transparent,rgba(16,216,255,.7),transparent);
  animation:scanLine 5s ease-in-out infinite;pointer-events:none;
}

/* ── WORDMARK ── */
.wordmark{margin-top:16px;perspective:800px;}
.brand-name{
  font-size:clamp(2.8rem,5.5vw,5rem);font-weight:700;
  letter-spacing:.2em;color:#fff;text-transform:uppercase;
  display:inline-block;position:relative;overflow:hidden;
  animation:textSwing 8.5s ease-in-out infinite, textGlow 9s ease-in-out infinite;
  transform-style:preserve-3d;
}
.brand-name::after{
  content:'';position:absolute;top:0;bottom:0;width:55px;
  background:linear-gradient(90deg,transparent,rgba(16,216,255,.55),rgba(192,64,255,.28),transparent);
  animation:shimmerLine 6s ease-in-out infinite;pointer-events:none;filter:blur(3px);
}
.gradient{
  background:linear-gradient(120deg,var(--cyan) 0%,#8040ff 50%,var(--purple) 100%);
  background-size:200% 200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:shimmer 4s ease-in-out infinite;
}
.brand-sub{
  font-size:clamp(.6rem,.8vw,.85rem);font-weight:300;
  letter-spacing:.45em;color:var(--cyan);
  text-transform:uppercase;margin-top:6px;opacity:.6;
  font-family:'JetBrains Mono',monospace;
}

/* ── STATUS BADGE ── */
.status-badge{
  display:inline-flex;align-items:center;gap:10px;
  margin-top:20px;margin-bottom:0px;
  padding:10px 26px;border-radius:100px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.12);
  font-size:.82rem;font-weight:400;letter-spacing:.06em;
  color:rgba(255,255,255,.82);
  font-family:'Space Grotesk',sans-serif;
  animation:fadeUp .8s ease .3s both;
  box-shadow:0 0 28px rgba(192,64,255,.08), inset 0 0 20px rgba(16,216,255,.03);
}
.status-dot{width:7px;height:7px;border-radius:50%;background:#00ff99;
  box-shadow:0 0 8px #00ff99, 0 0 16px rgba(0,255,153,.4);
  animation:statusBlink 1.5s ease-in-out infinite;flex-shrink:0;}

/* ── TAGLINE ── */
.tagline{
  margin-top:16px;font-size:clamp(.9rem,1.2vw,1.05rem);font-weight:300;
  color:rgba(180,180,220,.65);letter-spacing:.03em;
  animation:fadeUp .9s ease .5s both;
}
.tagline em{color:#8080c0;font-style:normal;}

/* ── COUNTDOWN ── */
.countdown{
  display:flex;gap:clamp(6px,2vw,16px);margin-top:24px;
  animation:fadeUp .9s ease .7s both;
  align-items:center;
}
.cd-unit{
  text-align:center;
  border:1px solid rgba(16,216,255,.18);border-radius:8px;
  padding:12px 16px;min-width:72px;
  background:rgba(16,216,255,.03);
  position:relative;overflow:hidden;
}
.cd-unit::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(16,216,255,.5),transparent);
}
.cd-num{
  font-size:clamp(2rem,4vw,3.2rem);font-weight:700;
  color:#fff;font-family:'JetBrains Mono',monospace;line-height:1;
  text-shadow:0 0 18px rgba(16,216,255,.8),0 0 40px rgba(16,216,255,.3);
  letter-spacing:.04em;
}
.cd-label{
  font-size:.48rem;letter-spacing:.3em;color:rgba(16,216,255,.4);
  text-transform:uppercase;margin-top:6px;font-family:'JetBrains Mono',monospace;
}
.cd-sep{
  font-size:clamp(1.5rem,3vw,2.4rem);color:rgba(16,216,255,.3);
  font-weight:700;line-height:1;align-self:center;font-family:'JetBrains Mono',monospace;
  text-shadow:0 0 10px rgba(16,216,255,.5);
  animation:sepBlink 1s step-end infinite;
}
@keyframes sepBlink{0%,100%{opacity:1;}50%{opacity:.2;}}

/* ── NOTIFY FORM ── */
.notify-wrap{
  margin-top:24px;display:flex;gap:0;
  border:1px solid rgba(16,216,255,.2);border-radius:12px;overflow:hidden;
  background:rgba(10,10,28,.7);backdrop-filter:blur(8px);
  animation:fadeUp .9s ease .9s both;
  width:clamp(280px,50vw,420px);
}
.notify-wrap input{
  flex:1;background:transparent;border:none;outline:none;
  padding:12px 18px;font-size:.8rem;color:#d0d0f0;
  font-family:'Space Grotesk',sans-serif;cursor:none;
}
.notify-wrap input::placeholder{color:var(--muted);}
.notify-btn{
  padding:12px 22px;background:linear-gradient(135deg,rgba(16,216,255,.15),rgba(192,64,255,.1));
  border:none;border-left:1px solid rgba(16,216,255,.2);color:var(--cyan);
  font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  cursor:none;font-family:'Space Grotesk',sans-serif;transition:background .2s;
  white-space:nowrap;
}
.notify-btn:hover{background:linear-gradient(135deg,rgba(16,216,255,.3),rgba(192,64,255,.2));}
.notify-success{
  display:none;padding:12px 20px;
  font-size:.75rem;letter-spacing:.06em;color:#00ff99;font-family:'JetBrains Mono',monospace;
}

/* ── FOOTER LINKS ── */
.footer-links{
  margin-top:24px;display:flex;gap:28px;align-items:center;
  animation:fadeUp .9s ease 1.1s both;
}
.footer-links a{
  font-size:.68rem;letter-spacing:.18em;text-decoration:none;
  text-transform:uppercase;font-family:'JetBrains Mono',monospace;
}
/* Email — neon cyan pulse */
.footer-links a:nth-child(1){
  color:var(--cyan);
  animation:emailPulse 2.5s ease-in-out infinite;
}
/* Instagram — neon pink/magenta */
.footer-links a:nth-child(2){
  color:#ff40a0;
  animation:igPulse 2.8s ease-in-out infinite;
}
/* LinkedIn — electric blue */
.footer-links a:nth-child(3){
  color:#4090ff;
  animation:liPulse 3.1s ease-in-out infinite;
}
@keyframes emailPulse{
  0%,100%{color:var(--cyan);text-shadow:0 0 7px rgba(16,216,255,.85),0 0 18px rgba(16,216,255,.45),0 0 36px rgba(16,216,255,.2);}
  50%{color:#a0f4ff;text-shadow:0 0 14px rgba(16,216,255,1),0 0 32px rgba(16,216,255,.75),0 0 60px rgba(16,216,255,.4);}
}
@keyframes igPulse{
  0%,100%{color:#ff40a0;text-shadow:0 0 7px rgba(255,64,160,.85),0 0 18px rgba(255,0,180,.45),0 0 36px rgba(192,40,200,.2);}
  50%{color:#ff90c8;text-shadow:0 0 14px rgba(255,64,160,1),0 0 32px rgba(255,0,180,.75),0 0 60px rgba(255,40,220,.4);}
}
@keyframes liPulse{
  0%,100%{color:#4090ff;text-shadow:0 0 7px rgba(64,144,255,.85),0 0 18px rgba(64,144,255,.45),0 0 36px rgba(64,144,255,.2);}
  50%{color:#90b8ff;text-shadow:0 0 14px rgba(64,144,255,1),0 0 32px rgba(64,144,255,.75),0 0 60px rgba(64,144,255,.4);}
}

/* ── SCANLINES ── */
.scanlines{
  position:fixed;inset:0;z-index:6;pointer-events:none;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 3px,
    rgba(0,0,0,.07) 3px,rgba(0,0,0,.07) 4px
  );
}

/* ── HUD CORNERS ── */
.hud-corner{position:fixed;width:24px;height:24px;z-index:25;border-color:rgba(16,216,255,.3);border-style:solid;pointer-events:none;}
.hud-corner.tl{top:16px;left:16px;border-width:2px 0 0 2px;}
.hud-corner.tr{top:16px;right:16px;border-width:2px 2px 0 0;}
.hud-corner.bl{bottom:16px;left:16px;border-width:0 0 2px 2px;}
.hud-corner.br{bottom:16px;right:16px;border-width:0 2px 2px 0;}

/* ── HUD TOP BAR ── */
.hud-topbar{
  position:fixed;top:0;left:0;right:0;z-index:30;pointer-events:none;
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 28px;
  background:linear-gradient(180deg,rgba(5,5,14,.9) 0%,transparent 100%);
  font-family:'JetBrains Mono',monospace;font-size:.48rem;
  letter-spacing:.18em;text-transform:uppercase;
}
.hud-signal{color:rgba(0,255,153,.55);display:flex;align-items:center;gap:6px;}
.hud-signal::before{content:'';width:5px;height:5px;border-radius:50%;background:#00ff99;
  box-shadow:0 0 6px #00ff99;animation:statusBlink 1.5s ease-in-out infinite;display:inline-block;}
.hud-mid{color:rgba(16,216,255,.35);}
.hud-time{color:rgba(16,216,255,.45);font-size:.46rem;}

/* ── HUD BOTTOM ── */
.hud-bottom{
  position:fixed;bottom:0;left:0;right:0;z-index:30;pointer-events:none;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 28px;
  background:linear-gradient(0deg,rgba(5,5,14,.9) 0%,transparent 100%);
  font-family:'JetBrains Mono',monospace;font-size:.44rem;
  letter-spacing:.16em;text-transform:uppercase;color:rgba(16,216,255,.25);
}

/* ── DOMAIN BADGE ── */
.domain-badge{
  position:fixed;bottom:20px;right:24px;z-index:20;
  font-size:.55rem;letter-spacing:.18em;color:#202050;
  font-family:'JetBrains Mono',monospace;text-transform:uppercase;
}

/* ── KEYFRAMES ── */
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.18;}50%{transform:scale(1.1);opacity:.06;}}
@keyframes orb1{0%{transform:rotate(0deg) translateX(100px) scale(1);}50%{transform:rotate(180deg) translateX(100px) scale(.6);}100%{transform:rotate(360deg) translateX(100px) scale(1);}}
@keyframes orb2{0%{transform:rotate(60deg) translateX(80px) scale(.8);}50%{transform:rotate(240deg) translateX(80px) scale(1.2);}100%{transform:rotate(420deg) translateX(80px) scale(.8);}}
@keyframes orb3{0%{transform:rotate(130deg) translateX(115px) scale(.7);}50%{transform:rotate(310deg) translateX(115px) scale(1);}100%{transform:rotate(490deg) translateX(115px) scale(.7);}}
@keyframes logoSwing{
  0%  {transform:perspective(600px) rotateY(-18deg) rotateX(10deg);}
  22% {transform:perspective(600px) rotateY(5deg)   rotateX(-6deg) translateY(-6px);}
  50% {transform:perspective(600px) rotateY(18deg)  rotateX(10deg);}
  75% {transform:perspective(600px) rotateY(-5deg)  rotateX(-4deg) translateY(6px);}
  100%{transform:perspective(600px) rotateY(-18deg) rotateX(10deg);}
}
@keyframes glowPulse{
  0%,100%{filter:drop-shadow(0 0 8px rgba(16,216,255,.5)) drop-shadow(0 0 22px rgba(192,64,255,.25));}
  50%    {filter:drop-shadow(0 0 22px rgba(16,216,255,.95)) drop-shadow(0 0 55px rgba(192,64,255,.6));}
}
@keyframes textSwing{
  0%  {transform:perspective(700px) rotateY(-22deg) rotateX(8deg)  translateZ(-10px);}
  18% {transform:perspective(700px) rotateY(6deg)   rotateX(-5deg) translateZ(18px);}
  38% {transform:perspective(700px) rotateY(24deg)  rotateX(9deg)  translateZ(-8px);}
  55% {transform:perspective(700px) rotateY(-4deg)  rotateX(-7deg) translateZ(22px);}
  74% {transform:perspective(700px) rotateY(-20deg) rotateX(5deg)  translateZ(-12px);}
  100%{transform:perspective(700px) rotateY(-22deg) rotateX(8deg)  translateZ(-10px);}
}
@keyframes textGlow{
  0%,88%,100%{text-shadow:0 0 18px rgba(16,216,255,.4),0 0 40px rgba(192,64,255,.18);}
  89%{text-shadow:-4px 0 rgba(16,216,255,.85),4px 0 rgba(192,64,255,.85);}
  91%{text-shadow:4px 0 rgba(16,216,255,.85),-4px 0 rgba(192,64,255,.85);}
  95%{text-shadow:0 0 18px rgba(16,216,255,.4),0 0 40px rgba(192,64,255,.18);}
}
@keyframes shimmer{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
@keyframes shimmerLine{0%{left:-120%;opacity:0;}10%{opacity:.6;}90%{opacity:.5;}100%{left:120%;opacity:0;}}
@keyframes scanLine{0%{top:-8%;opacity:0;}8%{opacity:.7;}90%{opacity:.5;}100%{top:108%;opacity:0;}}
@keyframes statusBlink{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="scanlines"></div>
<div class="hud-corner tl"></div>
<div class="hud-corner tr"></div>
<div class="hud-corner bl"></div>
<div class="hud-corner br"></div>
<div class="hud-topbar">
  <span class="hud-signal">Signal Lock</span>
  <span class="hud-mid">36.8°S · 174.7°E · Aotearoa</span>
  <span class="hud-time" id="hud-clock">--:--:--</span>
</div>
<div class="hud-bottom">
  <span>v1.0 · Pre-launch</span>
  <span id="hud-date">--</span>
</div>
<div class="cursor-ring" id="cr"></div>
<div class="cursor-dot"  id="cd"></div>

<div class="main">

  <!-- LOGO -->
  <div class="logo-stage">
    <div class="ring"></div><div class="ring"></div><div class="ring"></div>
    <div class="orbiters">
      <div class="orb"></div><div class="orb"></div><div class="orb"></div>
    </div>
    <div class="logo-wrap" id="logoWrap">
      <svg viewBox="0 0 220 220" width="210" height="210" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="gc" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fff"/>
            <stop offset="35%" stop-color="#80ecff" stop-opacity=".8"/>
            <stop offset="100%" stop-color="#c040ff" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="gr" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#10d8ff"/>
            <stop offset="100%" stop-color="#c040ff"/>
          </linearGradient>
          <filter id="fg" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="fs" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <ellipse cx="110" cy="110" rx="88" ry="88" fill="none" stroke="#8030d0" stroke-width="40" opacity=".04" filter="url(#fg)"/>
        <g id="starPolys">
          <polygon points="110,16 87,83 110,110"  fill="#0888b8"/>
          <polygon points="110,16 110,110 133,83" fill="#20e8ff"/>
          <polygon points="204,110 133,83 110,110" fill="#8030e8"/>
          <polygon points="204,110 110,110 133,137" fill="#5c16b8"/>
          <polygon points="110,204 133,137 110,110" fill="#c040ff"/>
          <polygon points="110,204 110,110 87,137" fill="#9828d8"/>
          <polygon points="16,110 87,137 110,110"  fill="#0868a0"/>
          <polygon points="16,110 110,110 87,83"   fill="#10b0e8"/>
        </g>
        <g style="transform-box:fill-box;transform-origin:50% 50%;animation:orbitIdle 22s linear infinite;">
          <ellipse cx="110" cy="110" rx="55" ry="17" fill="none" stroke="url(#gr)" stroke-width="2.3" opacity=".7" transform="rotate(22,110,110)"/>
          <circle cx="165" cy="110" r="3.5" fill="#c040ff" opacity=".9" transform="rotate(22,110,110)" filter="url(#fs)"/>
        </g>
        <circle cx="110" cy="110" r="24" fill="url(#gc)" style="animation:coreBreathe 2.5s ease-in-out infinite;"/>
        <circle cx="110" cy="110" r="9"  fill="white" opacity=".88" style="animation:coreBreathe 2.5s ease-in-out infinite;"/>
      </svg>
    </div>
  </div>

  <!-- WORDMARK -->
  <div class="wordmark">
    <div class="brand-name">WHET<span class="gradient">Ū</span> DIGITAL</div>
    <div class="brand-sub">Aotearoa · New Zealand</div>
  </div>

  <!-- TAGLINE -->
  <p class="tagline" id="tagline"></p>

  <!-- COUNTDOWN -->
  <div class="countdown">
    <div class="cd-unit"><div class="cd-num" id="cd-d">00</div><div class="cd-label">Days</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-unit"><div class="cd-num" id="cd-h">00</div><div class="cd-label">Hours</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-unit"><div class="cd-num" id="cd-m">00</div><div class="cd-label">Minutes</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-unit"><div class="cd-num" id="cd-s">00</div><div class="cd-label">Seconds</div></div>
  </div>

  <!-- STATUS -->
  <div class="status-badge">
    <span class="status-dot"></span>
    Something bold is being built
  </div>

  <!-- NOTIFY -->
  <div class="notify-wrap" id="notify-form">
    <input type="email" id="notify-email" placeholder="your@email.com — be first to know" />
    <button class="notify-btn" onclick="submitNotify()">Notify Me</button>
  </div>
  <div class="notify-success" id="notify-ok">
    ✓ &nbsp; You're on the list. We'll be in touch.
  </div>

  <!-- LINKS -->
  <div class="footer-links">
    <a href="mailto:hello@whetudigital.co.nz">hello@whetudigital.co.nz</a>
    <a href="https://instagram.com/whetudigital" target="_blank" rel="noopener">Instagram</a>
    <a href="https://linkedin.com/company/whetudigital" target="_blank" rel="noopener">LinkedIn</a>
  </div>

</div>


<style>
@keyframes orbitIdle{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes coreBreathe{0%,100%{opacity:.75;}50%{opacity:1;}}
</style>

<script>
/* ── CURSOR ── */
const cr=document.getElementById('cr'),cd_el=document.getElementById('cd');
let rx=0,ry=0,tx=0,ty=0;
document.addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY;cd_el.style.left=tx+'px';cd_el.style.top=ty+'px';});
(function animCursor(){rx+=(tx-rx)*.12;ry+=(ty-ry)*.12;cr.style.left=rx+'px';cr.style.top=ry+'px';requestAnimationFrame(animCursor);})();

/* ── MOUSE PARALLAX ── */
let cx=window.innerWidth/2,cy=window.innerHeight/2;
window.addEventListener('resize',()=>{cx=window.innerWidth/2;cy=window.innerHeight/2;});
let pRX=0,pRY=0;
document.addEventListener('mousemove',e=>{pRX=(e.clientY-cy)/cy*-10;pRY=(e.clientX-cx)/cx*12;});
const logoWrap=document.getElementById('logoWrap');
const wordmark=document.querySelector('.wordmark');
(function animParallax(){
  logoWrap.style.transform=`perspective(800px) rotateX(${pRX}deg) rotateY(${pRY}deg)`;
  wordmark.style.transform=`perspective(800px) rotateX(${pRX*.45}deg) rotateY(${pRY*.45}deg)`;
  requestAnimationFrame(animParallax);
})();

/* ── HOLOGRAPHIC STAR ── */
const polys=[...document.querySelectorAll('#starPolys polygon')];
const base=['#0888b8','#20e8ff','#8030e8','#5c16b8','#c040ff','#9828d8','#0868a0','#10b0e8'];
function shiftHex(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,Math.max(0,r+Math.round(amt*.8)))},${Math.min(255,Math.max(0,g+Math.round(amt*.4)))},${Math.min(255,Math.max(0,b+Math.round(amt)))})`;
}
document.addEventListener('mousemove',e=>{
  const t=(e.clientX/window.innerWidth)*2-1;
  polys.forEach((p,i)=>p.style.fill=shiftHex(base[i],t*55));
});

/* ── TYPEWRITER ── */
const tagEl=document.getElementById('tagline');
const tagText='Digital tools that move people forward.';
let ti=0;
tagEl.style.borderRight='2px solid rgba(16,216,255,.7)';
setTimeout(function type(){
  tagEl.textContent=tagText.slice(0,ti+1);ti++;
  if(ti<tagText.length)setTimeout(type,46);
  else setTimeout(()=>tagEl.style.borderRight='none',800);
},1000);

/* ── COUNTDOWN ── (launch: 1 June 2026) ── */
const launch=new Date('2026-06-01T09:00:00+12:00');
function pad(n){return String(n).padStart(2,'0');}
function tick(){
  const diff=launch-new Date();
  if(diff<=0){document.querySelector('.countdown').innerHTML='<div class="cd-unit"><div class="cd-num" style="color:#00ff99">LIVE</div><div class="cd-label">We\'re live!</div></div>';return;}
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  document.getElementById('cd-d').textContent=pad(d);
  document.getElementById('cd-h').textContent=pad(h);
  document.getElementById('cd-m').textContent=pad(m);
  document.getElementById('cd-s').textContent=pad(s);
}
tick();setInterval(tick,1000);

/* ── NOTIFY ── */
const W3F_KEY='YOUR_WEB3FORMS_KEY'; // get free key at web3forms.com — takes 30 seconds
async function submitNotify(){
  const emailEl=document.getElementById('notify-email');
  const email=emailEl.value.trim();
  if(!email||!email.includes('@')){emailEl.style.borderBottom='1px solid #ff4060';return;}
  const btn=document.querySelector('.notify-btn');
  btn.textContent='Sending…';btn.disabled=true;
  try{
    const r=await fetch('https://api.web3forms.com/submit',{
      method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({access_key:W3F_KEY,email,subject:'Whetū Digital — Launch notification signup',from_name:'Whetū Digital Website'})
    });
    const d=await r.json();
    if(d.success){
      document.getElementById('notify-form').style.display='none';
      document.getElementById('notify-ok').style.display='block';
    }else{btn.textContent='Notify Me';btn.disabled=false;}
  }catch(e){btn.textContent='Notify Me';btn.disabled=false;}
}
document.getElementById('notify-email').addEventListener('keydown',e=>{if(e.key==='Enter')submitNotify();});

/* ── HUD CLOCK ── */
(function hudClock(){
  const cl=document.getElementById('hud-clock');
  const dt=document.getElementById('hud-date');
  const days=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  function tick(){
    const n=new Date();
    const h=String(n.getHours()).padStart(2,'0');
    const m=String(n.getMinutes()).padStart(2,'0');
    const s=String(n.getSeconds()).padStart(2,'0');
    cl.textContent=`${h}:${m}:${s}`;
    dt.textContent=`${days[n.getDay()]} ${n.getDate()} ${months[n.getMonth()]} ${n.getFullYear()}`;
  }
  tick();setInterval(tick,1000);
})();

/* ── PARTICLE CANVAS ── */
(function(){
  const canvas=document.getElementById('bg-canvas');
  const ctx=canvas.getContext('2d');
  const CHARS='01アイウエオカ∑∆∏√∞≠§Ψ◈★⬡'.split('');
  const COLORS=['#10d8ff','#c040ff','#00ff99','#8040ff'];
  let W,H,particles;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function mkP(){return{x:Math.random()*W,y:Math.random()*H,char:CHARS[Math.floor(Math.random()*CHARS.length)],
    color:COLORS[Math.floor(Math.random()*COLORS.length)],size:9+Math.random()*8,
    vy:.18+Math.random()*.3,op:.15+Math.random()*.4,life:0,max:180+Math.floor(Math.random()*200)};}
  function init(){resize();particles=Array.from({length:55},mkP);}
  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach((p,i)=>{
      p.life++;p.y+=p.vy;
      const f=p.life<30?p.life/30:p.life>p.max-30?(p.max-p.life)/30:1;
      ctx.globalAlpha=p.op*f;ctx.fillStyle=p.color;
      ctx.font=`${p.size}px 'JetBrains Mono',monospace`;
      ctx.fillText(p.char,p.x,p.y);
      if(Math.random()<.04)p.char=CHARS[Math.floor(Math.random()*CHARS.length)];
      if(p.life>=p.max||p.y>H+20)particles[i]=mkP();
    });
    ctx.globalAlpha=1;requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  init();draw();
})();
</script>
</body>
</html>
